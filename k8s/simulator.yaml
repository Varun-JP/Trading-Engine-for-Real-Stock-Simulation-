apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-simulator
  template:
    metadata:
      labels:
        app: nexus-simulator
    spec:
      initContainers:
      - name: wait-for-kafka
        image: busybox
        command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 5; done']
      containers:
      - name: nexus-simulator
        image: varun123jjsdj/nexus-simulator:latest
        command: ["node", "simulator.js"]
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: REDIS_URL
          value: "redis://redis:6379"
        envFrom:
        - secretRef:
            name: nexus-secret
